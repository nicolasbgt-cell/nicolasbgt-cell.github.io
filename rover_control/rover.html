<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Rover Control</title>
	<style>
	.grid {
		display: grid;
		grid-template-columns: repeat(3, 100px);
		grid-template-rows: repeat(3, 100px);
		gap: 10px;
		width: fit-content;
		margin: auto;
		}

	button {
		width: 100px;
		height: 100px;
		font-size: 18px;
		cursor: pointer;
		}

	.center {
		grid-column: 2;
		grid-row: 2;
		}

	.up {
		grid-column: 2;
		grid-row: 1;
		}
	
	.down {
		grid-column: 2;
		grid-row: 3;
		}

	.left {
		grid-column: 1;
		grid-row: 2;
		}
	
	.right {
		grid-column: 3;
		grid-row: 2;
		}
</style>
</head>
	<body>
	<h1>Rover Remote Control</h1>
	<div class="grid">
		<button class="up">Forward</button>
		<button class="left">Left</button>
		<button class="center">Stop</button>
		<button class="right">Right</button>
		<button class="down">Backward</button>
	</div>
	</body>
</html>
